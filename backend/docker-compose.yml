version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare_db
    environment:
      POSTGRES_USER: healthcare_user
      POSTGRES_PASSWORD: healthcare_pass
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare_user -d healthcare"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: healthcare_api
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://healthcare_user:healthcare_pass@postgres:5432/healthcare
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/models
      - ./backend/data:/app/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: healthcare_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@healthcare.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: